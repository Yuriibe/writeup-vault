name: "Publish to dev.to"
on:
  push:
    branches:
      - main
    paths:
      - "_posts/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to dev.to
        env:
          DEVTO_TOKEN: ${{ secrets.DEVTO_TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, json, urllib.request, urllib.error

          token = os.environ["DEVTO_TOKEN"]
          posts_dir = "_posts"

          def parse_frontmatter(content):
              match = re.match(r'^---\n(.*?)\n---\n(.*)', content, re.DOTALL)
              if not match:
                  return {}, content
              fm_raw, body = match.group(1), match.group(2)
              fm = {}
              for line in fm_raw.splitlines():
                  if ': ' in line:
                      key, val = line.split(': ', 1)
                      fm[key.strip()] = val.strip().strip('"')
              return fm, body

          for filename in sorted(os.listdir(posts_dir)):
              if not filename.endswith('.md'):
                  continue
              filepath = os.path.join(posts_dir, filename)
              with open(filepath, 'r', encoding='utf-8') as f:
                  content = f.read()

              fm, body = parse_frontmatter(content)

              if 'dev_to_id' in fm:
                  print(f"Skipping {filename} (already published, id={fm['dev_to_id']})")
                  continue

              tags_raw = fm.get('tags', '[]')
              tags = re.findall(r'[\w]+', tags_raw)[:4]

              article = {
                  "title": fm.get('title', filename),
                  "published": fm.get('published', 'true') == 'true',
                  "body_markdown": body.strip(),
                  "tags": tags,
              }
              if 'canonical_url' in fm:
                  article["canonical_url"] = fm['canonical_url']

              payload = json.dumps({"article": article}).encode('utf-8')
              req = urllib.request.Request(
                  'https://dev.to/api/articles',
                  data=payload,
                  headers={
                      'api-key': token,
                      'Content-Type': 'application/json',
                      'Accept': 'application/json',
                  }
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      result = json.loads(resp.read())
                      dev_to_id = result['id']
                      print(f"Published {filename} -> dev.to id={dev_to_id}")
              except urllib.error.HTTPError as e:
                  error_body = e.read().decode('utf-8')
                  print(f"FAILED {filename}: HTTP {e.code} - {error_body}")
          EOF
